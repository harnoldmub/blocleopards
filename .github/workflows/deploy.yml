name: Deploy — Bloc Léopards

on:
  push:
    branches:
      - main

jobs:
  # ── Étape 1 : vérification du build ───────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier le build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SESSION_TOKEN: ${{ secrets.ADMIN_SESSION_TOKEN }}
          PUBLIC_SANITY_PROJECT_ID: ${{ secrets.PUBLIC_SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: ${{ secrets.PUBLIC_SANITY_DATASET }}

  # ── Étape 2 : approbation manuelle requise ────────────────────────────────
  approve:
    name: Approbation requise
    needs: build
    runs-on: ubuntu-latest
    environment: production        # ← bloque ici jusqu'à ton accord dans GitHub
    steps:
      - name: Approuvé
        run: echo "✅ Déploiement approuvé par ${{ github.actor }}"

  # ── Étape 3 : déploiement ─────────────────────────────────────────────────
  deploy:
    name: Déploiement
    needs: approve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Build de production
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SESSION_TOKEN: ${{ secrets.ADMIN_SESSION_TOKEN }}
          PUBLIC_SANITY_PROJECT_ID: ${{ secrets.PUBLIC_SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: ${{ secrets.PUBLIC_SANITY_DATASET }}

      - name: Déployer sur le serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/blocleopards
            git pull origin main
            npm ci --production
            npm run build
            pm2 restart blocleopards || pm2 start dist/server/entry.mjs --name blocleopards
